name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          cache-dependency-path: package-lock.json
          node-version: 24
      - name: Restore cache
        id: cache-npm
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Run Unit Tests
        run: npm run test
      # - name: Codecov
      #   uses: codecov/codecov-action@v5
      #   with:
      #     fail_ci_if_error: true
      #     use_oidc: true

  put-secret-basic-integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Build
        uses: ./.github/actions/build
      - name: Put secret (basic)
        uses: ./
        with:
          secret-id: PutSecretsIntegrationTest/BasicSecret
          secret-value: integration-test-basic-value
      - name: Assert
        env:
          PUT_SECRET_TEST_ID: PutSecretsIntegrationTest/BasicSecret
          PUT_SECRET_TEST_VALUE: integration-test-basic-value
        run: npm run integration-test __integration_tests__/put_secret_basic.test.ts

  put-secret-json-integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Build
        uses: ./.github/actions/build
      - name: Put secret (JSON)
        uses: ./
        with:
          secret-id: PutSecretsIntegrationTest/JsonSecret
          secret-value: '{"api_user":"user","api_key":"key","config":{"active":"true"}}'
      - name: Assert
        env:
          PUT_SECRET_JSON_TEST_ID: PutSecretsIntegrationTest/JsonSecret
          PUT_SECRET_JSON_TEST_VALUE: '{"api_user":"user","api_key":"key","config":{"active":"true"}}'
        run: npm run integration-test __integration_tests__/put_secret_json.test.ts

  put-secret-tags-integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Build
        uses: ./.github/actions/build
      - name: Put secret (with tags)
        uses: ./
        with:
          secret-id: PutSecretsIntegrationTest/TaggedSecret
          secret-value: integration-test-tagged-value
          tags: '{"Environment":"integration","Test":"put-secrets"}'
      - name: Assert
        env:
          PUT_SECRET_TAGS_TEST_ID: PutSecretsIntegrationTest/TaggedSecret
        run: npm run integration-test __integration_tests__/put_secret_tags.test.ts

  us-east-1-integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Build
        uses: ./.github/actions/build
      - name: Put secret (us-east-1)
        uses: ./
        with:
          secret-id: PutSecretsIntegrationTest/UsEast1Secret
          secret-value: integration-test-us-east-1-value
          auto-select-family-attempt-timeout: "2000"
      - name: Assert
        env:
          AWS_DEFAULT_REGION: us-east-1
          PUT_SECRET_TEST_ID: PutSecretsIntegrationTest/UsEast1Secret
          PUT_SECRET_TEST_VALUE: integration-test-us-east-1-value
        run: npm run integration-test __integration_tests__/put_secret_basic.test.ts
